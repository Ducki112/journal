<style>
:root {
  --bg:#0a0a0a; --bg2:#111; --bg3:#1a1a1a;
  --border:#1e1e1e; --border2:#2a2a2a; --border3:#333;
  --text:#f0ede6; --text2:#ccc; --text3:#888; --text4:#444;
  --green:#27ae60; --red:#e74c3c; --teal:#00d4aa; --amber:#f39c12;
  --win-bg:#081a10; --win-bdr:#27ae6033;
  --loss-bg:#1a0808; --loss-bdr:#e74c3c33;
  --neu-bg:#0d1a17; --neu-bdr:#00d4aa22;
}
[data-theme="light"] {
  --bg:#f5f4f0; --bg2:#ffffff; --bg3:#ebebeb;
  --border:#ddd; --border2:#ccc; --border3:#bbb;
  --text:#1a1a1a; --text2:#333; --text3:#666; --text4:#999;
  --win-bg:#edfaf3; --win-bdr:#27ae6044;
  --loss-bg:#fdf0ef; --loss-bdr:#e74c3c44;
  --neu-bg:#edfaf6; --neu-bdr:#00d4aa44;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:Georgia,serif;color:var(--text);min-height:100vh;transition:background .2s,color .2s}
header{border-bottom:1px solid var(--border);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header h1{font-size:22px;font-weight:400;letter-spacing:-.5px}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.demo-badge{font-size:10px;font-family:monospace;color:var(--amber);background:color-mix(in srgb,var(--amber) 12%,transparent);border:1px solid color-mix(in srgb,var(--amber) 25%,transparent);padding:2px 7px;border-radius:20px}
.meta-pill{font-size:11px;color:var(--text4);font-family:monospace}
.save-indicator{font-size:10px;font-family:monospace;color:var(--teal);opacity:0;transition:opacity .3s}
.save-indicator.show{opacity:1}
.theme-toggle{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:11px;font-family:monospace;color:var(--text3);cursor:pointer;transition:all .15s}
.theme-toggle:hover{color:var(--text);border-color:var(--border3)}
.nav-tabs{display:flex;gap:3px}
.nav-tab{padding:5px 12px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text4);font-size:11px;font-family:monospace;cursor:pointer;transition:all .15s}
.nav-tab.active{background:color-mix(in srgb,var(--text) 10%,transparent);color:var(--text);border-color:var(--border2)}
.nav-tab.hidden{display:none}
.page{display:none;max-width:1200px;margin:0 auto;padding:24px 28px}
.page.active{display:flex;gap:22px}
.page.full{display:none;flex-direction:column}
.page.full.active{display:flex}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;margin-bottom:14px;overflow:hidden}
.card-header{padding:10px 14px;border-bottom:1px solid var(--border);font-size:10px;font-family:monospace;color:var(--text4);letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between}
.card-header span{color:var(--teal)}
.compose-col{flex:1;min-width:0}
.analysis-col{width:300px;flex-shrink:0}
.mode-row{display:flex;gap:7px;padding:12px 14px;border-bottom:1px solid var(--border)}
.mode-btn{flex:1;padding:7px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text4);font-size:11px;font-family:monospace;cursor:pointer;transition:all .15s;text-align:center}
.mode-btn.active{border-color:var(--teal);background:color-mix(in srgb,var(--teal) 10%,transparent);color:var(--teal)}
.trade-fields{padding:12px 14px;border-bottom:1px solid var(--border);display:none}
.trade-fields.show{display:block}
.field-row{display:flex;gap:9px;margin-bottom:9px;flex-wrap:wrap}
.field-row:last-child{margin-bottom:0}
.field{display:flex;flex-direction:column;gap:3px;flex:1;min-width:78px}
.field label{font-size:10px;font-family:monospace;color:var(--text4)}
.field input,.field select{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:5px 7px;color:var(--text);font-size:12px;font-family:monospace;outline:none;width:100%}
.field input::placeholder{color:var(--text4)}
.pnl-display{font-size:12px;font-family:monospace;padding:5px 7px;border-radius:3px;border:1px solid var(--border);background:var(--bg);min-width:78px;color:var(--text4)}
.pnl-display.pos{color:var(--green);border-color:color-mix(in srgb,var(--green) 30%,transparent)}
.pnl-display.neg{color:var(--red);border-color:color-mix(in srgb,var(--red) 30%,transparent)}
.img-zone{margin:0 14px 12px;border:1px dashed var(--border2);border-radius:4px;padding:14px;text-align:center;cursor:pointer;transition:all .2s;font-size:11px;color:var(--text4);font-family:monospace}
.img-zone:hover,.img-zone.drag{border-color:var(--teal);background:color-mix(in srgb,var(--teal) 5%,transparent);color:var(--teal)}
.img-zone.has-img{border-color:color-mix(in srgb,var(--teal) 40%,transparent);padding:0}
.img-zone img{width:100%;max-height:190px;object-fit:contain;background:var(--bg);display:block}
.img-zone .img-actions{display:flex;justify-content:space-between;padding:5px 9px;background:var(--neu-bg)}
.img-zone .img-actions button{background:none;border:none;font-size:10px;font-family:monospace;cursor:pointer}
.remove-img{color:var(--red)}.img-label{color:var(--text4)}
textarea{width:100%;background:transparent;border:none;outline:none;padding:12px 14px;color:var(--text);font-size:14px;font-family:Georgia,serif;resize:none;line-height:1.7;display:block}
textarea::placeholder{color:var(--text4)}
.compose-footer{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-top:1px solid var(--border);flex-wrap:wrap;gap:7px}
.left-controls{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.mic-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border2);background:var(--bg3);color:var(--text3);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.mic-btn.active{border:2px solid var(--red);background:color-mix(in srgb,var(--red) 15%,transparent);color:var(--red)}
.tag-btn{padding:2px 7px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text4);font-size:10px;font-family:monospace;cursor:pointer;transition:all .15s}
.save-btn{background:var(--bg3);color:var(--text4);border:none;border-radius:4px;padding:6px 14px;font-size:11px;font-family:monospace;cursor:default;transition:all .15s;letter-spacing:.5px;white-space:nowrap}
.save-btn.active{background:var(--text);color:var(--bg);cursor:pointer}
.status-bar{padding:7px 14px;display:none;align-items:center;gap:7px}
.status-bar.recording{display:flex;background:color-mix(in srgb,var(--red) 8%,transparent);border-bottom:1px solid var(--border)}
.status-bar.thinking{display:flex;background:color-mix(in srgb,var(--teal) 6%,transparent);border-bottom:1px solid var(--border)}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;animation:pulse 1s infinite}
.dot.red{background:var(--red)}.dot.green{background:var(--teal)}
.status-text{font-size:11px;font-family:monospace}
.status-bar.recording .status-text{color:var(--red)}
.status-bar.thinking .status-text{color:var(--teal)}
.analysis-panel{background:var(--neu-bg);border:1px solid var(--neu-bdr);border-radius:6px;padding:16px;margin-bottom:14px}
.analysis-panel.hidden{display:none}
.ap-label{font-size:10px;font-family:monospace;color:var(--teal);letter-spacing:1px;margin-bottom:3px}
.ap-topic{font-size:11px;font-family:monospace;color:color-mix(in srgb,var(--teal) 55%,var(--bg));text-transform:capitalize;margin-bottom:12px}
.ap-analysis{font-size:12px;line-height:1.7;color:color-mix(in srgb,var(--teal) 65%,var(--text));margin-bottom:16px;font-style:italic}
.ap-tips-label{font-size:10px;font-family:monospace;color:var(--teal);letter-spacing:1px;margin-bottom:9px}
.tip{display:flex;gap:7px;margin-bottom:9px;align-items:flex-start}
.tip-num{color:var(--teal);font-size:10px;font-family:monospace;flex-shrink:0;margin-top:2px}
.tip p{margin:0;font-size:11px;line-height:1.6;color:color-mix(in srgb,var(--teal) 55%,var(--text))}
.error-bar{background:color-mix(in srgb,var(--red) 10%,transparent);border:1px solid color-mix(in srgb,var(--red) 25%,transparent);border-radius:4px;padding:9px 12px;margin-bottom:12px;font-size:11px;color:var(--red);font-family:monospace;display:none;justify-content:space-between;align-items:center}
.error-bar.show{display:flex}
.error-bar button{background:none;border:none;color:var(--red);cursor:pointer;font-size:15px}
.feed{display:flex;flex-direction:column;gap:9px}
.empty-state{text-align:center;color:var(--text4);padding:50px 0;font-size:12px;font-family:monospace}
.entry{background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.entry:hover{border-color:var(--border2)}
.entry-header{display:flex;align-items:center;gap:9px;padding:10px 14px 7px}
.entry-tag{font-size:10px;font-family:monospace;padding:2px 6px;border-radius:20px}
.entry-date{font-size:10px;color:var(--text4);font-family:monospace;margin-left:auto}
.entry-delete{background:none;border:none;color:var(--border2);cursor:pointer;font-size:14px;transition:color .15s}
.entry-delete:hover{color:var(--red)}
.entry-body{padding:0 14px 10px;display:flex;gap:10px}
.entry-text{flex:1;font-size:12px;line-height:1.6;color:var(--text3);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.entry-text.expanded{display:block;overflow:visible}
.entry-thumb{width:68px;height:46px;object-fit:cover;border-radius:3px;flex-shrink:0;border:1px solid var(--border)}
.entry-footer{padding:0 14px 9px;display:flex;justify-content:flex-end}
.entry-analysis-btn{font-size:10px;font-family:monospace;color:var(--teal);background:color-mix(in srgb,var(--teal) 8%,transparent);border:1px solid color-mix(in srgb,var(--teal) 20%,transparent);padding:2px 7px;border-radius:20px;cursor:pointer}
.search-row{display:flex;gap:8px;margin-bottom:14px}
.search-row input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:7px 10px;color:var(--text);font-size:11px;font-family:monospace;outline:none}
.search-row input::placeholder{color:var(--text4)}
.search-row select{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:7px 9px;font-size:10px;font-family:monospace;outline:none;cursor:pointer;color:var(--text)}
.cal-controls{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.cal-controls button{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:5px 11px;color:var(--text3);font-size:13px;cursor:pointer;transition:all .15s}
.cal-controls button:hover{color:var(--text)}
.cal-month{font-size:15px;font-weight:400}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px}
.cal-day-label{text-align:center;font-size:10px;font-family:monospace;color:var(--text4);padding:5px 0}
.cal-day{min-height:64px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:5px;cursor:pointer;transition:all .15s}
.cal-day:hover{border-color:var(--border2)}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default}
.cal-day.today{border-color:color-mix(in srgb,var(--teal) 50%,transparent)}
.cal-day.has-loss{border-left:3px solid var(--red)}
.cal-day.has-win{border-left:3px solid var(--green)}
.cal-day.has-mixed{border-left:3px solid var(--amber)}
.cal-day.has-journal{border-left:3px solid var(--text4)}
.cal-day.selected{background:var(--bg3);border-color:var(--border2)}
.cal-day-num{font-size:10px;font-family:monospace;color:var(--text4);margin-bottom:2px}
.cal-day.today .cal-day-num{color:var(--teal)}
.cal-pnl{font-size:9px;font-family:monospace}
.cal-pnl.pos{color:var(--green)}.cal-pnl.neg{color:var(--red)}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;margin-top:2px}
.cal-dot{width:4px;height:4px;border-radius:50%}
.cal-day-detail{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px}
.cal-day-detail h3{font-size:11px;font-family:monospace;color:var(--text4);margin-bottom:10px}
.cal-entry-row{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer}
.cal-entry-row:last-child{border-bottom:none}
.cal-entry-row:hover .cal-entry-text{color:var(--text)}
.cal-entry-text{font-size:12px;color:var(--text3);flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cal-entry-pnl{font-size:10px;font-family:monospace}
.patterns-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:11px;margin-bottom:18px}
.pattern-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px}
.pattern-card h3{font-size:10px;font-family:monospace;color:var(--text4);margin-bottom:6px;letter-spacing:.5px}
.pattern-card .big-num{font-size:24px;font-weight:400;color:var(--text);margin-bottom:3px}
.pattern-card .sub{font-size:10px;color:var(--text4);font-family:monospace}
.pattern-card.warn .big-num{color:var(--amber)}
.pattern-card.danger .big-num{color:var(--red)}
.pattern-card.good .big-num{color:var(--green)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mistakes-card,.insight-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px}
.insight-card{background:var(--neu-bg);border-color:var(--neu-bdr)}
.insight-card h3{font-size:10px;font-family:monospace;color:var(--teal);letter-spacing:.5px;margin-bottom:10px}
.insight-item{display:flex;gap:7px;margin-bottom:9px;align-items:flex-start}
.insight-dot{width:4px;height:4px;border-radius:50%;background:var(--teal);flex-shrink:0;margin-top:5px}
.insight-text{font-size:11px;line-height:1.6;color:color-mix(in srgb,var(--teal) 60%,var(--text))}
.sec-title{font-size:10px;font-family:monospace;color:var(--text4);letter-spacing:.5px;margin-bottom:10px}
.mistake-row{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.mistake-row:last-child{margin-bottom:0}
.mistake-bar-bg{flex:1;height:3px;background:var(--bg3);border-radius:2px}
.mistake-bar{height:3px;border-radius:2px;background:var(--red)}
.mistake-label{font-size:10px;font-family:monospace;color:var(--text4);width:155px;flex-shrink:0}
.mistake-count{font-size:10px;font-family:monospace;color:var(--text4);width:18px;text-align:right}
.goals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;margin-bottom:18px}
.goal-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px;position:relative}
.goal-label{font-size:10px;font-family:monospace;color:var(--text4);letter-spacing:.5px;margin-bottom:4px}
.goal-title{font-size:12px;margin-bottom:10px;color:var(--text);line-height:1.4}
.goal-progress-bg{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:9px;overflow:hidden}
.goal-progress-fill{height:3px;border-radius:2px;transition:width .5s}
.goal-stats{display:flex;justify-content:space-between;align-items:baseline}
.goal-current{font-size:18px;font-family:monospace}
.goal-target{font-size:10px;font-family:monospace;color:var(--text4)}
.goal-status{font-size:10px;font-family:monospace;padding:2px 6px;border-radius:20px}
.goal-status.on-track{color:var(--green);background:color-mix(in srgb,var(--green) 10%,transparent)}
.goal-status.off-track{color:var(--red);background:color-mix(in srgb,var(--red) 10%,transparent)}
.goal-status.hit{color:var(--teal);background:color-mix(in srgb,var(--teal) 10%,transparent)}
.goal-delete{position:absolute;top:9px;right:11px;background:none;border:none;color:var(--border2);cursor:pointer;font-size:13px;transition:color .15s}
.goal-delete:hover{color:var(--red)}
.add-goal-card{background:var(--bg);border:1px dashed var(--border2);border-radius:6px;padding:14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;min-height:100px;font-size:11px;font-family:monospace;color:var(--text4)}
.add-goal-card:hover{border-color:var(--border3);color:var(--text3)}
.detail-back{display:flex;align-items:center;gap:7px;margin-bottom:18px;cursor:pointer;color:var(--text4);font-size:11px;font-family:monospace;transition:color .15s;width:fit-content}
.detail-back:hover{color:var(--text)}
.detail-layout{display:flex;gap:20px;align-items:flex-start}
.detail-main{flex:1;min-width:0}
.detail-sidebar{width:300px;flex-shrink:0;position:sticky;top:22px}
.detail-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:14px}
.detail-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.detail-ticker{font-size:20px;font-weight:400;letter-spacing:-.5px}
.detail-direction{font-size:10px;font-family:monospace;padding:2px 7px;border-radius:20px;background:var(--bg3);color:var(--text4)}
.detail-pnl{font-size:18px;font-family:monospace;margin-left:auto}
.detail-pnl.pos{color:var(--green)}.detail-pnl.neg{color:var(--red)}
.detail-trade-stats{display:flex;border-bottom:1px solid var(--border)}
.detail-stat{flex:1;padding:10px 14px;border-right:1px solid var(--border)}
.detail-stat:last-child{border-right:none}
.detail-stat label{font-size:10px;font-family:monospace;color:var(--text4);display:block;margin-bottom:3px}
.detail-stat span{font-size:13px;font-family:monospace;color:var(--text)}
.detail-text{padding:14px 18px;font-size:13px;line-height:1.8;color:var(--text2);border-bottom:1px solid var(--border)}
.detail-text.no-border{border-bottom:none}
.detail-image{width:100%;max-height:290px;object-fit:contain;background:var(--bg);display:block;cursor:pointer}
.detail-meta{padding:9px 16px;display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.detail-tag{font-size:10px;font-family:monospace;padding:2px 6px;border-radius:20px}
.detail-date{font-size:10px;color:var(--text4);font-family:monospace}
.modal-overlay{display:none;position:fixed;inset:0;background:#00000099;z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:22px;width:340px;max-width:90vw}
.modal h2{font-size:15px;font-weight:400;margin-bottom:18px}
.modal-field{margin-bottom:12px}
.modal-field label{font-size:10px;font-family:monospace;color:var(--text4);display:block;margin-bottom:4px;letter-spacing:.5px}
.modal-field input,.modal-field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:7px 9px;color:var(--text);font-size:12px;font-family:monospace;outline:none}
.modal-btns{display:flex;gap:7px;margin-top:18px}
.modal-btn{flex:1;padding:7px;border-radius:4px;font-size:11px;font-family:monospace;cursor:pointer;border:none;transition:all .15s}
.modal-btn.primary{background:var(--text);color:var(--bg)}
.modal-btn.secondary{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.checklist-overlay{display:none;position:fixed;inset:0;background:#000000dd;z-index:300;align-items:center;justify-content:center}
.checklist-overlay.show{display:flex}
.checklist-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:26px;width:420px;max-width:92vw}
.checklist-modal h2{font-size:15px;font-weight:400;margin-bottom:3px}
.checklist-sub{font-size:11px;font-family:monospace;color:var(--text4);margin-bottom:20px}
.check-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;cursor:pointer}
.check-box{width:17px;height:17px;border-radius:3px;border:1px solid var(--border2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--bg);font-size:10px;color:var(--bg);font-weight:bold}
.check-box.checked{background:var(--teal);border-color:var(--teal);color:var(--bg)}
.check-label{font-size:12px;line-height:1.5;color:var(--text3);transition:color .15s}
.check-item:hover .check-label{color:var(--text)}
.cl-progress{margin:18px 0 0;display:flex;align-items:center;gap:10px}
.cl-progress-bg{flex:1;height:3px;background:var(--bg3);border-radius:2px}
.cl-progress-fill{height:3px;border-radius:2px;background:var(--teal);transition:width .3s}
.cl-progress-text{font-size:10px;font-family:monospace;color:var(--text4);white-space:nowrap}
.checklist-btns{display:flex;gap:7px;margin-top:18px}
.checklist-btn{flex:1;padding:7px;border-radius:4px;font-size:11px;font-family:monospace;cursor:pointer;border:none;transition:all .15s}
.checklist-btn.primary{background:var(--text);color:var(--bg)}
.checklist-btn.primary:disabled{background:var(--bg3);color:var(--text4);cursor:default}
.checklist-btn.secondary{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.lightbox{display:none;position:fixed;inset:0;background:#000000cc;z-index:400;align-items:center;justify-content:center;cursor:pointer}
.lightbox.show{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* iOS safe areas */
header { padding-top: max(18px, env(safe-area-inset-top)); padding-left: max(16px, env(safe-area-inset-left)); padding-right: max(16px, env(safe-area-inset-right)); }
.page { padding-bottom: max(24px, env(safe-area-inset-bottom)); }

/* ── Mobile responsive ── */
@media (max-width: 640px) {
  header { padding:14px 16px; gap:8px; }
  header h1 { font-size:20px; }
  .header-right { gap:8px; width:100%; justify-content:space-between; }
  .nav-tabs { width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px; }
  .nav-tab { padding:6px 10px; font-size:10px; white-space:nowrap; flex-shrink:0; }
  .theme-toggle { font-size:10px; padding:3px 8px; }
  .meta-pill, .save-indicator { font-size:10px; }

  /* Compose: single column on mobile */
  #page-compose { flex-direction:column; padding:14px 12px; gap:14px; }
  .compose-col { width:100%; }
  .analysis-col { width:100%; }

  /* Trade fields: 2-column grid on mobile */
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .field-row .field:last-child { grid-column: span 2; } /* P&L full width */

  /* Instrument type row */
  .inst-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }

  /* Bigger touch targets */
  .field input, .field select { padding:9px 8px; font-size:13px; }
  textarea { font-size:15px; }
  .save-btn { width:100%; text-align:center; padding:10px; font-size:12px; }
  .compose-footer { flex-direction:column; align-items:stretch; gap:9px; }

  /* Feed */

  .search-row { flex-wrap:wrap; }
  .search-row input { min-width:100%; }

  /* Calendar */

  /* Goals */

  /* Detail */
  #page-detail { padding:14px 12px; }
  .detail-layout { flex-direction:column; }
  .detail-sidebar { width:100%; position:static; }
}

/* Futures instrument badge */
.inst-badge{display:inline-block;font-size:9px;font-family:monospace;padding:1px 5px;border-radius:10px;background:color-mix(in srgb,var(--teal) 15%,transparent);color:var(--teal);border:1px solid color-mix(in srgb,var(--teal) 25%,transparent);margin-left:4px;}
.inst-badge.futures{background:color-mix(in srgb,var(--amber) 15%,transparent);color:var(--amber);border-color:color-mix(in srgb,var(--amber) 25%,transparent);}

<body>
<header>
  <h1>journal.</h1>
  <div class="header-right">
    <span class="save-indicator" id="save-indicator">💾 saved</span>
    <span class="meta-pill" id="entry-count">0 entries</span>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">☀ light mode</button>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('compose',this)">✏ compose</button>
      <button class="nav-tab" onclick="showPage('feed',this)">📋 entries</button>
      <button class="nav-tab" onclick="showPage('calendar',this)">📅 calendar</button>
      <button class="nav-tab" onclick="showPage('patterns',this)">📊 patterns</button>
      <button class="nav-tab" onclick="showPage('goals',this)">🎯 goals</button>
      <button class="nav-tab hidden" id="detail-tab" onclick="showPage('detail',this)">🔍 entry</button>
    </div>
  </div>
</header>

<!-- COMPOSE -->
<div class="page active" id="page-compose">
  <div class="compose-col">
    <div id="error-bar" class="error-bar"><span id="error-text"></span><button onclick="hideError()">×</button></div>
    <div class="card">
      <div class="mode-row">
        <button class="mode-btn active" id="mode-trading" onclick="setMode('trading')">📈 trade entry</button>
        <button class="mode-btn" id="mode-journal" onclick="setMode('journal')">📓 journal note</button>
      </div>
      <div class="trade-fields show" id="trade-fields">
        <!-- Instrument type row -->
        <div class="inst-row" style="display:flex;gap:8px;padding:10px 14px 0;flex-wrap:wrap;">
          <div class="field" style="flex:1;min-width:120px">
            <label>INSTRUMENT</label>
            <select id="tf-instrument" onchange="onInstrumentChange()">
              <optgroup label="Equities">
                <option value="equity">Stocks / ETFs</option>
              </optgroup>
              <optgroup label="Futures — Full">
                <option value="NQ">NQ (Nasdaq, $20/pt)</option>
                <option value="ES">ES (S&amp;P 500, $50/pt)</option>
                <option value="YM">YM (Dow, $5/pt)</option>
                <option value="RTY">RTY (Russell, $50/pt)</option>
                <option value="CL">CL (Crude Oil, $1000/pt)</option>
                <option value="GC">GC (Gold, $100/pt)</option>
                <option value="SI">SI (Silver, $5000/pt)</option>
              </optgroup>
              <optgroup label="Futures — Micro">
                <option value="MNQ">MNQ (Micro NQ, $2/pt)</option>
                <option value="MES">MES (Micro ES, $5/pt)</option>
                <option value="MYM">MYM (Micro Dow, $0.50/pt)</option>
                <option value="M2K">M2K (Micro Russell, $5/pt)</option>
                <option value="MCL">MCL (Micro Crude, $100/pt)</option>
                <option value="MGC">MGC (Micro Gold, $10/pt)</option>
              </optgroup>
            </select>
          </div>
          <div class="field" style="flex:1;min-width:100px">
            <label>DIRECTION</label>
            <select id="tf-direction"><option value="long">Long</option><option value="short">Short</option></select>
          </div>
        </div>
        <!-- Price / contracts row -->
        <div class="field-row" style="padding:8px 14px 10px;">
          <div class="field"><label>TICKER</label><input type="text" id="tf-ticker" placeholder="NQ" oninput="calcPnl()"/></div>
          <div class="field"><label>ENTRY</label><input type="number" id="tf-entry" placeholder="0.00" step="0.25" oninput="calcPnl()"/></div>
          <div class="field"><label>EXIT</label><input type="number" id="tf-exit" placeholder="0.00" step="0.25" oninput="calcPnl()"/></div>
          <div class="field"><label id="qty-label">CONTRACTS</label><input type="number" id="tf-shares" placeholder="1" oninput="calcPnl()"/></div>
          <div class="field" style="grid-column:span 2"><label>P&amp;L <span id="pt-value-badge" class="inst-badge futures" style="display:none"></span></label><div class="pnl-display" id="pnl-display">—</div></div>
        </div>
      </div>
      <div class="status-bar" id="status-bar"><div class="dot" id="status-dot"></div><span class="status-text" id="status-text"></span></div>
      <div id="img-zone" class="img-zone" onclick="triggerImgUpload()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleImgDrop(event)">📎 attach chart or image (click or drag)</div>
      <input type="file" id="img-input" accept="image/*" style="display:none" onchange="handleImgFile(this.files[0])"/>
      <textarea id="note-input" rows="5" placeholder="Describe your trade, thoughts, or anything else..."></textarea>
      <div class="compose-footer">
        <div class="left-controls">
          <button class="mic-btn" id="mic-btn" onclick="toggleRecording()">🎙</button>
          <div id="tag-buttons" style="display:flex;gap:4px;flex-wrap:wrap"></div>
        </div>
        <button class="save-btn" id="save-btn" onclick="handleSave()">save + analyze ✦</button>
      </div>
    </div>
  </div>
  <div class="analysis-col">
    <div class="analysis-panel hidden" id="analysis-panel">
      <div class="ap-label">AI ANALYSIS</div>
      <div class="ap-topic" id="ap-topic"></div>
      <div class="ap-analysis" id="ap-analysis"></div>
      <div class="ap-tips-label">ACTIONABLE TIPS</div>
      <div id="ap-tips"></div>
    </div>
    <div class="card">
      <div class="card-header">RECENT ENTRIES <span id="win-rate-small"></span></div>
      <div id="mini-feed" style="padding:0 0 4px"></div>
    </div>
  </div>
</div>

<!-- ENTRIES -->
<div class="page full" id="page-feed">
  <div class="search-row">
    <input type="text" id="search-input" placeholder="Search entries..." oninput="renderFeed()"/>
    <select id="filter-tag" onchange="renderFeed()"><option value="all">all tags</option></select>
    <select id="filter-mode" onchange="renderFeed()"><option value="all">all types</option><option value="trading">trades</option><option value="journal">journal</option></select>
  </div>
  <div class="feed" id="main-feed"></div>
</div>

<!-- CALENDAR -->
<div class="page full" id="page-calendar">
  <div class="cal-controls">
    <button onclick="calPrev()">&#8249;</button>
    <span class="cal-month" id="cal-month-label"></span>
    <button onclick="calNext()">&#8250;</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="cal-day-detail" id="cal-day-detail" style="display:none"></div>
</div>

<!-- PATTERNS -->
<div class="page full" id="page-patterns">
  <div class="patterns-grid" id="patterns-grid"></div>
  <div class="two-col">
    <div class="mistakes-card"><div class="sec-title">RECURRING PATTERNS</div><div id="mistakes-bars"></div></div>
    <div class="insight-card"><h3>AI INSIGHTS</h3><div id="ai-insights"></div></div>
  </div>
</div>

<!-- GOALS -->
<div class="page full" id="page-goals">
  <div class="goals-grid" id="goals-grid"></div>
</div>

<!-- DETAIL -->
<div class="page full" id="page-detail">
  <div style="max-width:1080px;width:100%;margin:0 auto">
    <div class="detail-back" onclick="goBackToFeed()">&#8592; back to entries</div>
    <div class="detail-layout">
      <div class="detail-main"><div class="detail-card" id="detail-card"></div></div>
      <div class="detail-sidebar"><div id="detail-analysis-box"></div></div>
    </div>
  </div>
</div>

<!-- PRE-TRADE CHECKLIST -->
<div class="checklist-overlay" id="checklist-overlay">
  <div class="checklist-modal">
    <h2>Pre-Trade Checklist</h2>
    <p class="checklist-sub">Confirm all 6 items before this trade is logged.</p>
    <div id="checklist-items"></div>
    <div class="cl-progress">
      <div class="cl-progress-bg"><div class="cl-progress-fill" id="cl-progress-fill" style="width:0%"></div></div>
      <div class="cl-progress-text" id="cl-progress-text">0 / 6 complete</div>
    </div>
    <div class="checklist-btns">
      <button class="checklist-btn secondary" onclick="closeChecklist()">cancel</button>
      <button class="checklist-btn primary" id="cl-confirm-btn" onclick="confirmChecklist()" disabled>save + analyze ✦</button>
    </div>
  </div>
</div>

<!-- GOAL MODAL -->
<div class="modal-overlay" id="goal-modal">
  <div class="modal">
    <h2>Add Goal</h2>
    <div class="modal-field"><label>GOAL TYPE</label>
      <select id="gm-type">
        <option value="winrate">Win Rate (%)</option>
        <option value="pnl">Monthly P&amp;L ($)</option>
        <option value="maxloss">Max Loss Per Trade ($)</option>
        <option value="trades">Trades Per Week</option>
        <option value="journal">Journal Entries Per Week</option>
      </select>
    </div>
    <div class="modal-field"><label>TARGET VALUE</label><input type="number" id="gm-target" placeholder="e.g. 60"/></div>
    <div class="modal-field"><label>LABEL (optional)</label><input type="text" id="gm-label" placeholder="e.g. Hit 60% win rate"/></div>
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeGoalModal()">cancel</button>
      <button class="modal-btn primary" onclick="addGoal()">add goal</button>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src=""/></div>

<script>
const TAG_ACCENT={work:"#2980b9",idea:"#f39c12",todo:"#8e44ad",meeting:"#27ae60",personal:"#e74c3c",trading:"#00d4aa"};
const TAGS=Object.keys(TAG_ACCENT);
const DAY=86400000,NOW=Date.now();
const STORAGE_KEY="journal_v4",GOALS_KEY="journal_goals_v4",THEME_KEY="journal_theme";
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const CHECKLIST=[
  {id:"setup",label:"I have a clear setup with a defined entry trigger"},
  {id:"stop",label:"My stop loss level is set before I enter"},
  {id:"target",label:"I know my profit target — it gives at least 2:1 R/R"},
  {id:"size",label:"My position size risks no more than 2% of my account"},
  {id:"reason",label:"I can explain why I'm taking this trade in one sentence"},
  {id:"emotion",label:"I'm not trading out of boredom, fear, or to make back a loss"},
];

// Theme
function toggleTheme(){
  const isDark=document.documentElement.getAttribute("data-theme")==="dark";
  const next=isDark?"light":"dark";
  document.documentElement.setAttribute("data-theme",next);
  document.getElementById("theme-toggle").textContent=next==="dark"?"☀ light mode":"🌙 dark mode";
  try{localStorage.setItem(THEME_KEY,next);}catch(e){}
}
(function(){try{const t=localStorage.getItem(THEME_KEY);if(t){document.documentElement.setAttribute("data-theme",t);document.getElementById("theme-toggle").textContent=t==="dark"?"☀ light mode":"🌙 dark mode";}}catch(e){}})();

// Storage
function loadData(key,fallback){try{const s=localStorage.getItem(key);if(s)return JSON.parse(s);}catch(e){}return fallback();}
function saveData(key,data){try{localStorage.setItem(key,JSON.stringify(data));flashSaved();}catch(e){}}
function flashSaved(){const el=document.getElementById("save-indicator");el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2000);}

let entries=loadData(STORAGE_KEY,getDemoEntries);
let goals=loadData(GOALS_KEY,getDefaultGoals);

function getDemoEntries(){return[];}
function getDefaultGoals(){return[];}

// UI State
let selectedTag="trading",currentMode="trading",currentImage=null;
let isRecording=false,recognition=null,finalTranscript="";
let expandedIds=new Set(),selectedCalDay=null;
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
let checklistState={};

// Init tags
const tagBtnsEl=document.getElementById("tag-buttons");
TAGS.forEach(t=>{
  const btn=document.createElement("button");
  btn.className="tag-btn";btn.textContent=t;btn.dataset.tag=t;btn.onclick=()=>selectTag(t);
  tagBtnsEl.appendChild(btn);
  const o=document.createElement("option");o.value=t;o.textContent=t;
  document.getElementById("filter-tag").appendChild(o);
});
selectTag("trading");

function selectTag(t){
  selectedTag=t;
  document.querySelectorAll(".tag-btn").forEach(b=>{
    const bt=b.dataset.tag,active=bt===t;
    b.style.border=active?`1px solid ${TAG_ACCENT[bt]}`:"1px solid var(--border)";
    b.style.background=active?TAG_ACCENT[bt]+"22":"transparent";
    b.style.color=active?TAG_ACCENT[bt]:"var(--text4)";
  });
}

function showPage(p,el){
  document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));
  document.querySelectorAll(".nav-tab").forEach(e=>e.classList.remove("active"));
  document.getElementById("page-"+p).classList.add("active");
  if(el)el.classList.add("active");
  if(p==="feed")renderFeed();
  if(p==="calendar")renderCalendar();
  if(p==="patterns")renderPatterns();
  if(p==="goals")renderGoals();
}

function setMode(m){
  currentMode=m;
  document.getElementById("mode-trading").classList.toggle("active",m==="trading");
  document.getElementById("mode-journal").classList.toggle("active",m==="journal");
  document.getElementById("trade-fields").classList.toggle("show",m==="trading");
  if(m==="trading")selectTag("trading");
}
setMode("trading");

// Futures point values ($ per point per contract)
const FUTURES_PV={
  NQ:20, ES:50, YM:5, RTY:50, CL:1000, GC:100, SI:5000,
  MNQ:2, MES:5, MYM:0.5, M2K:5, MCL:100, MGC:10
};
const FUTURES_TICK={
  NQ:0.25, ES:0.25, YM:1, RTY:0.1, CL:0.01, GC:0.1, SI:0.005,
  MNQ:0.25, MES:0.25, MYM:1, M2K:0.1, MCL:0.01, MGC:0.1
};

function getPointValue(){
  const inst=document.getElementById("tf-instrument").value;
  return FUTURES_PV[inst]||null; // null = equity (shares * price diff)
}

function onInstrumentChange(){
  const inst=document.getElementById("tf-instrument").value;
  const isFutures=!!FUTURES_PV[inst];
  const lbl=document.getElementById("qty-label");
  const badge=document.getElementById("pt-value-badge");
  const tickerInput=document.getElementById("tf-ticker");
  const entryInput=document.getElementById("tf-entry");
  const exitInput=document.getElementById("tf-exit");

  lbl.textContent=isFutures?"CONTRACTS":"SHARES";
  document.getElementById("tf-shares").placeholder=isFutures?"1":"100";

  if(isFutures){
    badge.textContent=`$${FUTURES_PV[inst]}/pt`;
    badge.style.display="inline-block";
    tickerInput.value=inst; // auto-fill ticker
    entryInput.step=FUTURES_TICK[inst]||0.25;
    exitInput.step=FUTURES_TICK[inst]||0.25;
  } else {
    badge.style.display="none";
    tickerInput.value="";
    entryInput.step="0.01";
    exitInput.step="0.01";
  }
  calcPnl();
}

function calcPnl(){
  const e=parseFloat(document.getElementById("tf-entry").value);
  const x=parseFloat(document.getElementById("tf-exit").value);
  const qty=parseFloat(document.getElementById("tf-shares").value);
  const d=document.getElementById("tf-direction").value;
  const el=document.getElementById("pnl-display");
  if(!e||!x||!qty){el.textContent="—";el.className="pnl-display";return;}
  const pv=getPointValue();
  const diff=d==="long"?(x-e):(e-x);
  const pnl=pv ? diff*qty*pv : diff*qty;
  el.textContent=(pnl>=0?"+":"")+"$"+pnl.toFixed(2);
  el.className="pnl-display "+(pnl>=0?"pos":"neg");
}

function triggerImgUpload(){if(!currentImage)document.getElementById("img-input").click();}
function handleImgDrop(e){e.preventDefault();document.getElementById("img-zone").classList.remove("drag");const f=e.dataTransfer.files[0];if(f&&f.type.startsWith("image/"))handleImgFile(f);}
function handleImgFile(file){if(!file)return;const r=new FileReader();r.onload=e=>{currentImage={dataUrl:e.target.result,name:file.name};renderImgZone();updateSaveBtn();};r.readAsDataURL(file);}
function renderImgZone(){
  const z=document.getElementById("img-zone");
  if(currentImage){z.className="img-zone has-img";z.innerHTML=`<img src="${currentImage.dataUrl}" alt="attached"/><div class="img-actions"><span class="img-label">&#128206; ${currentImage.name}</span><button class="remove-img" onclick="event.stopPropagation();removeImage()">remove x</button></div>`;z.onclick=null;}
  else{z.className="img-zone";z.innerHTML="&#128206; attach chart or image (click or drag)";z.onclick=triggerImgUpload;}
}
function removeImage(){currentImage=null;renderImgZone();updateSaveBtn();}
function openLightbox(src){document.getElementById("lightbox-img").src=src;document.getElementById("lightbox").classList.add("show");}
function closeLightbox(){document.getElementById("lightbox").classList.remove("show");}

function setStatus(type,text){
  const b=document.getElementById("status-bar");
  if(!type){b.className="status-bar";return;}
  b.className="status-bar "+type;
  document.getElementById("status-dot").className="dot "+(type==="recording"?"red":"green");
  document.getElementById("status-text").textContent=text;
}
function showError(msg){document.getElementById("error-text").textContent=msg;document.getElementById("error-bar").className="error-bar show";}
function hideError(){document.getElementById("error-bar").className="error-bar";}

function toggleRecording(){isRecording?stopRecording():startRecording();}
function startRecording(){
  hideError();
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showError("Use Google Chrome for voice recording.");return;}
  recognition=new SR();recognition.continuous=true;recognition.interimResults=true;recognition.lang="en-US";
  finalTranscript=document.getElementById("note-input").value;
  recognition.onstart=()=>{isRecording=true;document.getElementById("mic-btn").classList.add("active");setStatus("recording","Listening... click mic to stop");};
  recognition.onresult=e=>{let interim="",final="";for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)final+=t;else interim+=t;}if(final)finalTranscript+=(finalTranscript?" ":"")+final.trim();document.getElementById("note-input").value=finalTranscript+(interim?" "+interim:"");updateSaveBtn();};
  recognition.onerror=e=>{if(e.error==="not-allowed")showError("Mic blocked. Allow mic in Chrome address bar.");stopRecording();};
  recognition.onend=()=>{if(isRecording)try{recognition.start();}catch(e){}};
  try{recognition.start();}catch(e){showError("Could not start mic.");}
}
function stopRecording(){
  isRecording=false;if(recognition){recognition.stop();recognition=null;}
  document.getElementById("mic-btn").classList.remove("active");setStatus(null);
  document.getElementById("note-input").value=finalTranscript;updateSaveBtn();

function updateSaveBtn(){const has=document.getElementById("note-input").value.trim()||currentImage;document.getElementById("save-btn").className="save-btn"+(has?" active":"");}
document.getElementById("note-input").addEventListener("input",updateSaveBtn);

function handleSave(){
  const text=document.getElementById("note-input").value.trim();
  if(!text&&!currentImage)return;
  if(currentMode==="trading")openChecklist();
  else doSave();
}

function openChecklist(){
  checklistState={};CHECKLIST.forEach(c=>checklistState[c.id]=false);
  renderChecklistItems();
  document.getElementById("checklist-overlay").classList.add("show");
}
function closeChecklist(){document.getElementById("checklist-overlay").classList.remove("show");}
function renderChecklistItems(){

  document.getElementById("checklist-items").innerHTML=CHECKLIST.map(c=>`
    <div class="check-item" onclick="toggleCheck('${c.id}')">

function doSave(){
  const text=document.getElementById("note-input").value.trim();if(!text&&!currentImage)return;if(isRecording)stopRecording();
  const inst=document.getElementById("tf-instrument").value;
  const isFutures=!!FUTURES_PV[inst];
  const pv=FUTURES_PV[inst]||null;
  const tradeData=currentMode==="trading"?{
    ticker:document.getElementById("tf-ticker").value.toUpperCase()||null,
    direction:document.getElementById("tf-direction").value,
    entry:parseFloat(document.getElementById("tf-entry").value)||null,
    exit:parseFloat(document.getElementById("tf-exit").value)||null,
    shares:parseFloat(document.getElementById("tf-shares").value)||null,
    instrument:inst,
    isFutures,
    pointValue:pv
  }:null;
  if(tradeData){
    const e=tradeData.entry,x=tradeData.exit,qty=tradeData.shares,d=tradeData.direction;
    if(e&&x&&qty){
      const diff=d==="long"?(x-e):(e-x);
      tradeData.pnl=pv ? diff*qty*pv : diff*qty;
    } else { tradeData.pnl=null; }
  }
  setStatus("thinking","Analyzing...");
  setTimeout(()=>{
    const analysis=analyzeEntry(text,currentImage,tradeData);
    const entry={id:Date.now(),mode:currentMode,tag:selectedTag,text:text||"",image:currentImage?currentImage.dataUrl:null,trade:tradeData,analysis,ts:Date.now()};
    entries.unshift(entry);saveData(STORAGE_KEY,entries);
    document.getElementById("note-input").value="";finalTranscript="";currentImage=null;renderImgZone();
    ["tf-ticker","tf-entry","tf-exit","tf-shares"].forEach(id=>document.getElementById(id).value="");
    document.getElementById("pnl-display").textContent="—";document.getElementById("pnl-display").className="pnl-display";
    document.getElementById("pt-value-badge").style.display="none";
    updateSaveBtn();updateEntryCount();setStatus(null);openDetailPage(entry.id);renderMiniFeeed();
  },250);
}

function analyzeEntry(text,image,trade){const t=(text||"").toLowerCase();const p=detectP(t);const base=buildResult(t,p,trade);if(image){base.analysis+=" Your chart is attached — use it alongside these insights.";base.tips.push("Review your chart: mark entry, exit, stop level, and any warning signs.");}if(trade?.pnl!=null){base.analysis=`${trade.ticker} ${trade.direction} — P&L: ${(trade.pnl>=0?"+":"")+"$"+trade.pnl.toFixed(2)}. `+base.analysis;}return base;}
function detectP(t){return{earlyExit:/sold too early|exit.*bounce|got out.*went up|left.*table|too early/.test(t),fearSell:/scared|afraid|fear|panic|couldn't hold|shook out|nervous/.test(t),revenge:/revenge|make it back|recoup|chasing|got back in/.test(t),oversize:/too big|oversize|too much|risked too much/.test(t),fomo:/fomo|missed|jumped in|chased|didn't want to miss/.test(t),goodDiscipline:/followed.*plan|stuck to|executed well|stayed calm|patient|clean execution|clean in/.test(t),winnerCut:/sold.*winner|took profit too early|could have held/.test(t),loserHeld:/held.*loss|didn't cut|averaged down|hope.*come back/.test(t),overtrading:/boredom|bored|just wanted to trade|without.*setup/.test(t),hesitation:/hesitat|waited too long|missed.*entry/.test(t)};}
function buildResult(t,p,trade){
  const isTrade=trade?.ticker;
  if(p.earlyExit||p.winnerCut)return{topic:"early exits / cutting winners",analysis:"You're cutting winners before their potential. Fear of giving back profits is overriding your original thesis.",tips:["Write your target before entering. Only exit early if the original reason is invalidated.","Use a trailing stop to let winners run.","Log what would have happened if you'd held to target."]};
  if(p.fearSell)return{topic:"fear-based selling",analysis:"Fear is overriding your plan. Normal pullbacks get interpreted as threats, forcing premature exits.",tips:["Set your stop before entering — not during the trade.","Reduce size until dips don't trigger emotional reactions.","Journal the daily chart vs intraday after a fear exit."]};
  if(p.fomo)return{topic:"FOMO entries",analysis:"FOMO entries happen after significant moves — you're entering with poor risk/reward.",tips:["Only enter if the setup meets your criteria.","Keep a missed trades log — most FOMO entries would have been losers.","Set price alerts at levels you'd actually buy."]};
  if(p.revenge)return{topic:"revenge trading",analysis:"Trading to make back losses means emotion is fully driving decisions.",tips:["Take a 30-minute break after every loss before placing another trade.","Set a daily max loss limit. When hit, the day is done.","Each trade is independent."]};
  if(p.loserHeld)return{topic:"holding losers",analysis:"Holding losing positions hoping for recovery turns manageable losses into large ones.",tips:["Ask: Would I buy this right now with no position? If no — exit.","Averaging down is doubling down on being wrong.","Pre-define your max loss before entry."]};
  if(p.oversize)return{topic:"position sizing",analysis:"Oversizing turns a bad trade into a bad day.",tips:["Risk a fixed % per trade (0.5-2%).","If the trade makes you anxious, it's too big.","Your worst trades are almost always your biggest."]};
  if(p.overtrading)return{topic:"overtrading / boredom",analysis:"Boredom is one of the most underrated causes of losses.",tips:["If you want to trade but don't have a setup, journal instead.","3 conditions must be true before entry.","Missing a day with no setups is a win."]};
  if(p.hesitation)return{topic:"hesitation / confidence",analysis:"Hesitation after a loss causes emotional carryover to the next trade.",tips:["Journal after each loss to close it emotionally.","If the setup is valid, trust the process.","Track missed trades due to hesitation."]};
  if(p.goodDiscipline)return{topic:"good execution",analysis:"You executed to plan — that's the real definition of a good trade.",tips:["Document exactly what you did well so you can repeat it.","Log this as a process win, separate from P&L.","Review best-executed trades monthly."]};
  if(isTrade)return{topic:"trade review",analysis:"Consistent journaling is one of the highest-leverage habits a trader can build.",tips:["Rate each trade 1-5 on execution, separate from P&L.","Find your #1 recurring mistake and focus on fixing only that.","Review weekly, not just after losses."]};
  return{topic:"journal entry",analysis:"Capturing thoughts consistently builds self-awareness.",tips:["Review notes weekly to spot recurring themes.","Add context when capturing.","Tag notes consistently."]};
}

function toggleExpand(id){expandedIds.has(id)?expandedIds.delete(id):expandedIds.add(id);renderFeed();}
function deleteEntry(id){entries=entries.filter(e=>e.id!==id);saveData(STORAGE_KEY,entries);updateEntryCount();renderFeed();renderMiniFeeed();}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}
function renderCalendar(){
  document.getElementById("cal-month-label").textContent=`${MONTHS[calMonth]} ${calYear}`;
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();
  let html="";
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>html+=`<div class="cal-day-label">${d}</div>`);
  for(let i=0;i<firstDay;i++)html+='<div class="cal-day empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${calYear}-${calMonth+1}-${d}`;
    const dayE=entries.filter(e=>{const ed=new Date(e.ts);return ed.getFullYear()===calYear&&ed.getMonth()===calMonth&&ed.getDate()===d;});
    const trades=dayE.filter(e=>e.trade?.pnl!=null);
    const dayPnl=trades.reduce((s,e)=>s+e.trade.pnl,0);
    const wins=trades.filter(e=>e.trade.pnl>0).length;
    const losses=trades.filter(e=>e.trade.pnl<0).length;
    let cls="cal-day";
    if(today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d)cls+=" today";
    if(selectedCalDay===dateStr)cls+=" selected";
    if(trades.length){if(wins>0&&losses>0)cls+=" has-mixed";else if(wins>0)cls+=" has-win";else cls+=" has-loss";}
    else if(dayE.length)cls+=" has-journal";
    const pnlHtml=trades.length?`<div class="cal-pnl ${dayPnl>=0?"pos":"neg"}">${dayPnl>=0?"+":""}$${Math.abs(dayPnl).toFixed(0)}</div>`:"";
    const dots=dayE.slice(0,4).map(e=>`<div class="cal-dot" style="background:${TAG_ACCENT[e.tag]}"></div>`).join("");
    html+=`<div class="${cls}" onclick="selectCalDay('${dateStr}')"><div class="cal-day-num">${d}</div>${pnlHtml}<div class="cal-dots">${dots}</div></div>`;
  }
  document.getElementById("cal-grid").innerHTML=html;
  if(selectedCalDay){const p=selectedCalDay.split("-");if(parseInt(p[1])-1===calMonth&&parseInt(p[0])===calYear)renderCalDayDetail(selectedCalDay);else{document.getElementById("cal-day-detail").style.display="none";selectedCalDay=null;}}
}
function selectCalDay(dateStr){selectedCalDay=selectedCalDay===dateStr?null:dateStr;renderCalendar();if(selectedCalDay)renderCalDayDetail(dateStr);else document.getElementById("cal-day-detail").style.display="none";}
function renderCalDayDetail(dateStr){
  const parts=dateStr.split("-");const yr=parseInt(parts[0]),mo=parseInt(parts[1])-1,dy=parseInt(parts[2]);
  const de=entries.filter(e=>{const ed=new Date(e.ts);return ed.getFullYear()===yr&&ed.getMonth()===mo&&ed.getDate()===dy;});
  const detail=document.getElementById("cal-day-detail");
  if(!de.length){detail.style.display="none";return;}
  const trades=de.filter(e=>e.trade?.pnl!=null),dayPnl=trades.reduce((s,e)=>s+e.trade.pnl,0);
  detail.style.display="block";
  detail.innerHTML=`<h3>${MONTHS[mo]} ${dy}, ${yr} &middot; ${de.length} entr${de.length!==1?"ies":"y"}${trades.length?` &middot; <span style="color:${dayPnl>=0?"var(--green)":"var(--red)"}">${dayPnl>=0?"+":""}$${dayPnl.toFixed(2)}</span>`:""}</h3>
  ${de.map(e=>`<div class="cal-entry-row" onclick="openDetailPage(${e.id})"><div style="width:7px;height:7px;border-radius:50%;background:${TAG_ACCENT[e.tag]};flex-shrink:0;margin-top:2px"></div><div class="cal-entry-text">${esc(e.text||"(image only)")}</div>${e.trade?.pnl!=null?`<span class="cal-entry-pnl" style="color:${e.trade.pnl>=0?"var(--green)":"var(--red)"}">${e.trade.pnl>=0?"+":""}$${e.trade.pnl.toFixed(2)}</span>`:""}</div>`).join("")}`;
}

function renderPatterns(){
  const trades=entries.filter(e=>e.trade?.pnl!=null);
  const wins=trades.filter(e=>e.trade.pnl>0),losses=trades.filter(e=>e.trade.pnl<=0);
  const totalPnl=trades.reduce((s,e)=>s+e.trade.pnl,0);
  const winRate=trades.length?Math.round(wins.length/trades.length*100):0;
  const avgWin=wins.length?wins.reduce((s,e)=>s+e.trade.pnl,0)/wins.length:0;
  const avgLoss=losses.length?losses.reduce((s,e)=>s+e.trade.pnl,0)/losses.length:0;
  const expectancy=trades.length?totalPnl/trades.length:0;
  document.getElementById("patterns-grid").innerHTML=[
    {label:"TOTAL ENTRIES",val:entries.length,sub:`${trades.length} trades logged`,cls:""},
    {label:"WIN RATE",val:trades.length?winRate+"%":"—",sub:`${wins.length}W / ${losses.length}L`,cls:winRate>=50?"good":winRate>=40?"warn":"danger"},
    {label:"TOTAL P&L",val:trades.length?(totalPnl>=0?"+":"")+"$"+totalPnl.toFixed(2):"—",sub:"all logged trades",cls:totalPnl>=0?"good":"danger"},
    {label:"AVG WIN",val:wins.length?"+$"+avgWin.toFixed(2):"—",sub:"per winning trade",cls:"good"},
    {label:"AVG LOSS",val:losses.length?"$"+avgLoss.toFixed(2):"—",sub:"per losing trade",cls:"danger"},
    {label:"EXPECTANCY",val:trades.length?(expectancy>=0?"+":"")+"$"+expectancy.toFixed(2):"—",sub:"avg P&L per trade",cls:expectancy>=0?"good":"danger"},
  ].map(({label,val,sub,cls})=>`<div class="pattern-card ${cls}"><h3>${label}</h3><div class="big-num">${val}</div><div class="sub">${sub}</div></div>`).join("");
  const mt=[
    {label:"Fear-based selling",keys:["scared","afraid","fear","panic"]},
    {label:"Cutting winners early",keys:["sold too early","took profit too early","could have held"]},
    {label:"FOMO entries",keys:["fomo","chased","jumped in"]},
    {label:"Revenge trading",keys:["revenge","make it back","recoup"]},
    {label:"Holding losers",keys:["held.*loss","didn't cut","averaged down"]},
    {label:"Oversizing",keys:["too big","oversize","risked too much"]},
    {label:"Boredom trading",keys:["boredom","bored","just wanted to trade"]},
    {label:"Emotional trading",keys:["emotional","frustrated","angry","impatient"]},
  ];
  const counts=mt.map(m=>({label:m.label,count:entries.filter(e=>m.keys.some(k=>new RegExp(k).test((e.text||"").toLowerCase()))).length})).sort((a,b)=>b.count-a.count);
  const maxC=Math.max(...counts.map(c=>c.count),1);
  document.getElementById("mistakes-bars").innerHTML=counts.map(c=>`<div class="mistake-row"><div class="mistake-label">${c.label}</div><div class="mistake-bar-bg"><div class="mistake-bar" style="width:${Math.round(c.count/maxC*100)}%"></div></div><div class="mistake-count">${c.count}</div></div>`).join("");
  const topM=counts[0];
  const goodT=entries.filter(e=>e.analysis?.topic?.includes("good execution")).length;
  const fearC=entries.filter(e=>/(scared|afraid|fear|panic)/.test((e.text||"").toLowerCase())).length;
  const lateE=entries.filter(e=>e.ts>NOW-10*DAY);
  const lateG=lateE.filter(e=>e.analysis?.topic?.includes("good execution")).length;
  const earlyG=entries.filter(e=>e.ts<NOW-15*DAY&&e.analysis?.topic?.includes("good execution")).length;
  document.getElementById("ai-insights").innerHTML=[
    topM.count>0?`Your most frequent pattern is <strong style="color:var(--text)">"${topM.label}"</strong> — ${topM.count} times. This is your #1 area to work on.`:"No single mistake dominates. Discipline is consistent.",
    fearC>2?`Fear-based decisions appear in ${fearC} entries. Your sizing may still be too large — smaller size often eliminates fear.`:"Fear-based decisions are infrequent. Sizing and risk tolerance appear well-matched.",
    `You've logged <strong style="color:var(--green)">${goodT} good execution trades</strong>. ${goodT>=5?"Strong foundation. Your process is working.":"Keep building — aim for good execution on every trade."}`,
    lateG>earlyG?`Your most recent entries show <strong style="color:var(--teal)">improved execution</strong> vs earlier entries. Journaling is translating into real change.`:"Execution quality has been consistent — continue the current approach.",
    `Across ${trades.length} trades, expectancy is <strong style="color:${expectancy>=0?"var(--green)":"var(--red)"}">${expectancy>=0?"+":""}$${expectancy.toFixed(2)}/trade</strong>. ${expectancy>0?"Positive expectancy means your edge is real.":"Focus on reducing your top mistake to push expectancy positive."}`,
  ].map(text=>`<div class="insight-item"><div class="insight-dot"></div><div class="insight-text">${text}</div></div>`).join("");
}

function openGoalModal(){document.getElementById("goal-modal").classList.add("show");}
function closeGoalModal(){document.getElementById("goal-modal").classList.remove("show");}
function addGoal(){
  const type=document.getElementById("gm-type").value;
  const target=parseFloat(document.getElementById("gm-target").value);
  const label=document.getElementById("gm-label").value.trim();
  if(!target)return;
  goals.push({id:Date.now(),type,target,label:label||{winrate:`Hit ${target}% win rate`,pnl:`$${target} monthly P&L`,maxloss:`Max $${target} loss per trade`,trades:`${target} trades per week`,journal:`Journal ${target}x per week`}[type]||"Goal",created:Date.now()});
  saveData(GOALS_KEY,goals);
  document.getElementById("gm-target").value="";document.getElementById("gm-label").value="";
  closeGoalModal();renderGoals();
}
function deleteGoal(id){goals=goals.filter(g=>g.id!==id);saveData(GOALS_KEY,goals);renderGoals();}
function calcGoalProgress(goal){
  const trades=entries.filter(e=>e.trade?.pnl!=null);
  const mStart=new Date();mStart.setDate(1);mStart.setHours(0,0,0,0);
  const wStart=new Date();wStart.setDate(wStart.getDate()-wStart.getDay());wStart.setHours(0,0,0,0);
  const mTrades=trades.filter(e=>e.ts>=mStart.getTime());
  const wEntries=entries.filter(e=>e.ts>=wStart.getTime());
  switch(goal.type){
    case"winrate":{const wins=mTrades.filter(e=>e.trade.pnl>0).length;const rate=mTrades.length?Math.round(wins/mTrades.length*100):0;return{current:rate,unit:"%",label:"this month",pct:Math.min(rate/goal.target*100,100)};}
    case"pnl":{const pnl=mTrades.reduce((s,e)=>s+e.trade.pnl,0);return{current:pnl.toFixed(0),unit:"$",label:"this month",pct:Math.min(Math.max(pnl/goal.target*100,0),100)};}
    case"maxloss":{const losses=mTrades.filter(e=>e.trade.pnl<0);const worst=losses.length?Math.min(...losses.map(e=>e.trade.pnl)):0;const ok=Math.abs(worst)<=goal.target;return{current:losses.length?Math.abs(worst).toFixed(0):"0",unit:"$ worst",label:"this month",pct:ok?100:Math.min(goal.target/Math.abs(worst)*100,100)};}
    case"trades":{const wt=wEntries.filter(e=>e.mode==="trading").length;return{current:wt,unit:"trades",label:"this week",pct:Math.min(wt/goal.target*100,100)};}
    case"journal":{const wj=wEntries.length;return{current:wj,unit:"entries",label:"this week",pct:Math.min(wj/goal.target*100,100)};}
    default:return{current:0,unit:"",label:"",pct:0};
  }
}
function renderGoals(){
  const grid=document.getElementById("goals-grid");
  const cards=goals.map(g=>{
    const prog=calcGoalProgress(g);const pct=Math.round(prog.pct);
    const hit=pct>=100,onTrack=pct>=50;
    const fillColor=hit?"var(--teal)":onTrack?"var(--green)":"var(--red)";
    const statusCls=hit?"hit":onTrack?"on-track":"off-track";
    const statusLabel=hit?"achieved":onTrack?"on track":"off track";
    const showDollar=prog.unit==="$"||prog.unit==="$ worst";
    return `<div class="goal-card">
      <button class="goal-delete" onclick="deleteGoal(${g.id})">x</button>
      <div class="goal-label">${g.type.toUpperCase()}</div>
      <div class="goal-title">${g.label}</div>
      <div class="goal-progress-bg"><div class="goal-progress-fill" style="width:${pct}%;background:${fillColor}"></div></div>
      <div class="goal-stats">
        <div><span class="goal-current" style="color:${fillColor}">${showDollar?"$":""}${prog.current}${!showDollar?" "+prog.unit:""}</span><span class="goal-target"> / ${showDollar?"$":""}${g.target}${!showDollar?" "+prog.unit:""}</span></div>
        <span class="goal-status ${statusCls}">${statusLabel}</span>
      </div>
      <div style="font-size:10px;font-family:monospace;color:var(--text4);margin-top:5px">${prog.label}</div>
    </div>`;
  });
  cards.push(`<div class="add-goal-card" onclick="openGoalModal()">+ add goal</div>`);
  grid.innerHTML=cards.join("");
}

function fmtDate(ts){const d=new Date(ts);return d.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" · "+d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

renderMiniFeeed();
updateEntryCount();

// ── PWA Service Worker (offline support) ──────────────────────────────────
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='journal-v4';
const ASSETS=[location.href];
self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)).then(()=>self.skipWaiting())));
self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim())));
self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res.ok){const clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));}return res;}).catch(()=>caches.match(e.request)))));
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}

window.toggleTheme=function(){
  origToggle();
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  document.getElementById('theme-color-meta').setAttribute('content',isDark?'#0a0a0a':'#f5f4f0');
};
